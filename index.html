<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Hapus Background Master (Mobile & Desktop)</title>
    
    <!-- 1. Import Map -->
    <script type="importmap">
      {
        "imports": {
          "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"
        }
      }
    </script>

    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-color: #252526;
            --text-color: #d4d4d4;
            --accent-color: #6200ea; 
            --accent-hover: #3700b3;
            --secondary-color: #007acc;
            --danger-color: #ce4a4a;
            --border-color: #3e3e42;
            --header-height: 50px;
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); height: 100vh; width: 100vw; overflow: hidden; display: flex; }

        /* --- Header (Mobile Only) --- */
        .mobile-header {
            display: none;
            height: var(--header-height);
            background-color: var(--panel-color);
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 30;
            flex-shrink: 0;
        }
        .menu-btn {
            background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px;
        }
        .mobile-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; }

        /* --- Sidebar --- */
        aside { 
            width: 320px; 
            background-color: var(--panel-color); 
            border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; 
            padding: 20px; gap: 10px; 
            z-index: 20; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.3); 
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        /* --- Workspace --- */
        main { 
            flex: 1; 
            position: relative; 
            background-color: #111; 
            overflow: hidden; 
            cursor: grab; 
            display: flex; align-items: center; justify-content: center;
            touch-action: none; /* Mencegah scroll browser saat sentuh canvas */
        }
        main.grabbing { cursor: grabbing; }
        main.crosshair { cursor: crosshair; }
        main.pencil { cursor: crosshair; }

        .canvas-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transform-origin: center center;
            background-image: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #222 75%), linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        canvas { display: block; pointer-events: none; position: absolute; top: 0; left: 0; }
        #overlayCanvas { pointer-events: auto; z-index: 2; }

        /* --- UI Components --- */
        h1 { font-size: 1.1rem; margin: 0 0 10px 0; color: #fff; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;}
        .ai-badge { background: linear-gradient(45deg, #6200ea, #b388ff); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        .control-group { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 8px; }
        .control-group h3 { margin: 0 0 8px 0; font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--secondary-color); }
        
        button { 
            background-color: var(--secondary-color); color: white; border: none; padding: 10px; 
            border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; 
            width: 100%; margin-bottom: 5px; font-weight: 500; display: flex; justify-content: space-between; align-items: center;
        }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; background-color: #444; transform: none; }
        
        button.ai-btn { background: linear-gradient(135deg, var(--accent-color), var(--accent-hover)); box-shadow: 0 4px 15px rgba(98, 0, 234, 0.3); justify-content: center;}
        button.ai-btn:disabled { background: #444; box-shadow: none; }
        
        button.secondary { background-color: transparent; border: 1px solid var(--secondary-color); color: var(--secondary-color); }
        button.secondary:hover { background-color: rgba(0, 122, 204, 0.1); }
        button.danger { background-color: var(--danger-color); }
        
        button.tool-btn { background: #333; border: 1px solid #444; text-align: left; padding-left: 10px;}
        button.tool-btn.active { background: var(--secondary-color); border-color: var(--secondary-color); }
        
        .file-input-wrapper input[type="file"] { display: none; }
        .file-input-label { display: block; padding: 10px; background-color: #333; text-align: center; border-radius: 6px; cursor: pointer; border: 2px dashed #666; font-size: 0.8rem; transition: 0.2s; }
        .file-input-label:hover { border-color: var(--secondary-color); color: var(--secondary-color); background-color: rgba(0, 122, 204, 0.05); }

        /* Overlays */
        #loadingOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .info-overlay { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; pointer-events: none; z-index: 10; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #333; color: #fff; padding: 10px 20px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; border-left: 4px solid var(--accent-color); font-size: 0.8rem; text-align: center;}
        #toast.show { opacity: 1; width: 80%; }

        .value-display { float: right; font-family: monospace; color: var(--accent-color); }
        #polygonControls { display: none; background: rgba(0, 122, 204, 0.1); border: 1px solid var(--accent-color); margin-top: 5px;}

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .mobile-header { display: flex; }
            
            aside { 
                position: fixed; 
                left: -100%; /* Sembunyikan di luar layar */
                top: var(--header-height); 
                bottom: 0; 
                width: 85%; 
                max-width: 320px; 
                z-index: 40; 
                transition: left 0.3s ease-in-out;
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }
            
            aside.open { left: 0; } /* Tampilkan saat aktif */

            /* Overlay gelap saat menu mobile terbuka */
            #sidebarOverlay {
                display: none;
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5); z-index: 35;
            }
            #sidebarOverlay.active { display: block; }

            /* Sesuaikan ukuran tombol untuk sentuhan */
            button { padding: 12px; font-size: 0.9rem; margin-bottom: 8px; }
            h1 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <!-- Overlay Gelap untuk Mobile Menu -->
    <div id="sidebarOverlay" onclick="window.toggleSidebar()"></div>

    <!-- Header Mobile -->
    <div class="mobile-header">
        <button class="menu-btn" onclick="window.toggleSidebar()">☰</button>
        <div class="mobile-title">AI Background Remover</div>
        <div style="width: 34px;"></div> <!-- Spacer agar title di tengah -->
    </div>

    <!-- Sidebar (Panel Kiri) -->
    <aside id="sidebar">
        <h1>🛠️ Master Remover <span class="ai-badge">ALL-IN-ONE</span></h1>

        <!-- Group 1: File & AI -->
        <div class="control-group">
            <div class="file-input-wrapper">
                <label for="uploadInput" class="file-input-label">📁 Buka Gambar</label>
                <input type="file" id="uploadInput" accept="image/*">
            </div>
            <button id="btnAutoRemove" class="ai-btn" disabled>✨ Hapus Otomatis (AI)</button>
            <button id="compareBtn" class="secondary" disabled onmousedown="window.startCompare()" onmouseup="window.endCompare()" onmouseleave="window.endCompare()" ontouchstart="window.startCompare()" ontouchend="window.endCompare()">👁️ Tahan untuk Lihat Asli</button>
            <button id="resetBtn" class="secondary" disabled>↺ Reset Gambar</button>
        </div>

        <!-- Group 2: Tools -->
        <div class="control-group">
            <h3>Mode Alat</h3>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <button class="tool-btn active" id="btnMove" onclick="window.setTool('move')">✋ Geser / Zoom</button>
                <button class="tool-btn" id="btnMagic" onclick="window.setTool('magic')">🪄 Magic Wand (Warna)</button>
                <button class="tool-btn" id="btnPolygon" onclick="window.setTool('polygon')">✂️ Poligon (Pemandangan)</button>
                <button class="tool-btn" id="btnEraser" onclick="window.setTool('eraser')">🧽 Penghapus</button>
                <button class="tool-btn" id="btnRestore" onclick="window.setTool('restore')">🖌️ Pulihkan (Restore)</button>
            </div>
            
            <div id="polygonControls">
                <p style="font-size:0.75rem; margin:0 0 5px 0; color:#ccc;">Klik kanan/klik awal untuk tutup.</p>
                <button onclick="window.finishPolygon('outside')" style="font-size:0.8rem; background-color: #006400;">✅ Hapus Luar</button>
                <button onclick="window.finishPolygon('inside')" class="danger" style="font-size:0.8rem;">🗑️ Hapus Dalam</button>
                <button onclick="window.resetPolygon()" class="secondary" style="font-size:0.8rem;">❌ Batal Poligon</button>
            </div>

            <div style="margin-top: 10px;">
                <label>Ukuran Kuas <span id="brushSizeVal" class="value-display">20px</span></label>
                <input type="range" id="brushSize" min="1" max="100" value="20">
            </div>
        </div>

        <!-- Group 3: Settings for Magic Wand -->
        <div class="control-group">
            <h3>Pengaturan Magic Wand</h3>
            <label>Toleransi Warna <span id="toleranceVal" class="value-display">30</span></label>
            <input type="range" id="tolerance" min="0" max="100" value="30">
            <button class="secondary" id="removeColorBtn" style="margin-top:5px; font-size:0.8rem;">🗑️ Hapus Warna Global</button>
        </div>

        <!-- Group 4: Actions -->
        <div class="control-group">
            <h3>History & Simpan</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button id="undoBtn" disabled>↩ Undo</button>
                <button id="redoBtn" disabled>↪ Redo</button>
            </div>
            <button id="downloadBtn" disabled style="margin-top: 10px; background-color: #00c853;">💾 Simpan PNG HD</button>
        </div>
    </aside>

    <main id="workspace">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="info-overlay" id="infoOverlay">Siap</div>
    </main>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <h3 id="loadingText">Memproses...</h3>
        <p style="font-size:0.8rem; color:#aaa; max-width: 300px; margin-top:10px;">Mohon tunggu. Sedang memproses.</p>
    </div>

    <div id="toast">Notifikasi</div>

    <!-- 2. SCRIPT UTAMA (Module) -->
    <script type="module">
        // Import AI Library
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm";

        // --- State Management ---
        const state = {
            scale: 1,
            panning: false,
            pointX: 0,
            pointY: 0,
            startX: 0,
            startY: 0,
            tool: 'move', 
            brushSize: 20,
            tolerance: 30,
            targetColor: { r: 255, g: 255, b: 255 },
            history: [],
            historyStep: -1,
            isDrawing: false,
            lastX: 0,
            lastY: 0,
            polyPoints: [],
            originalImage: null,
            initialPinchDistance: null
        };

        // --- DOM Elements ---
        const mainCanvas = document.getElementById('mainCanvas');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
        const oCtx = overlayCanvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const workspace = document.getElementById('workspace');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function init() {
            setupInteractions();
            window.addEventListener('resize', centerCanvas);
            updateUI();
        }

        // --- Mobile Sidebar Toggle ---
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        // --- Image Loading ---
        document.getElementById('uploadInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    mainCanvas.width = img.naturalWidth;
                    mainCanvas.height = img.naturalHeight;
                    overlayCanvas.width = img.naturalWidth;
                    overlayCanvas.height = img.naturalHeight;

                    ctx.drawImage(img, 0, 0);
                    state.originalImage = img; 
                    
                    state.history = [];
                    state.historyStep = -1;
                    saveHistory();

                    centerCanvas();
                    updateUI(true);
                    showToast("Gambar dimuat. Resolusi HD.");
                    
                    // Tutup sidebar di mobile setelah pilih gambar agar fokus ke edit
                    if (window.innerWidth <= 768) window.toggleSidebar();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function centerCanvas() {
            if (!state.originalImage) return;
            const wsRect = workspace.getBoundingClientRect();
            // Perhitungan scale mempertimbangkan header mobile jika ada
            const headerHeight = window.innerWidth <= 768 ? 50 : 0; 
            const availableHeight = wsRect.height;
            const availableWidth = wsRect.width;

            const scaleX = (availableWidth - 20) / mainCanvas.width;
            const scaleY = (availableHeight - 20) / mainCanvas.height;
            state.scale = Math.min(scaleX, scaleY, 1);
            
            state.pointX = (availableWidth - mainCanvas.width * state.scale) / 2;
            state.pointY = (availableHeight - mainCanvas.height * state.scale) / 2;
            updateTransform();
        }

        function updateTransform() {
            container.style.transform = `translate(${state.pointX}px, ${state.pointY}px) scale(${state.scale})`;
        }

        // --- AI Logic ---
        document.getElementById('btnAutoRemove').addEventListener('click', async () => {
            if (!state.originalImage) return;

            const config = {
                publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/dist/",
                progress: (key, current, total) => {
                    const percent = Math.round((current / total) * 100);
                    document.getElementById('loadingText').innerText = `AI Memproses: ${percent}%`;
                }
            };

            loadingOverlay.style.display = 'flex';
            document.getElementById('loadingText').innerText = "Menghubungkan ke AI...";

            try {
                const blob = await new Promise(resolve => mainCanvas.toBlob(resolve, 'image/png'));
                document.getElementById('loadingText').innerText = "Menganalisis & Memotong...";
                const resultBlob = await removeBackground(blob, { config: config });
                
                const url = URL.createObjectURL(resultBlob);
                const img = new Image();
                img.onload = () => {
                    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                    ctx.drawImage(img, 0, 0);
                    saveHistory();
                    loadingOverlay.style.display = 'none';
                    showToast("AI Selesai!");
                    URL.revokeObjectURL(url);
                };
                img.src = url;

            } catch (error) {
                console.error(error);
                loadingOverlay.style.display = 'none';
                alert("Gagal memproses AI.\nError: " + error.message);
            }
        });

        // --- Tools Logic ---
        window.setTool = function(toolName) {
            state.tool = toolName;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            if (toolName === 'move') document.getElementById('btnMove').classList.add('active');
            if (toolName === 'magic') document.getElementById('btnMagic').classList.add('active');
            if (toolName === 'polygon') document.getElementById('btnPolygon').classList.add('active');
            if (toolName === 'eraser') document.getElementById('btnEraser').classList.add('active');
            if (toolName === 'restore') document.getElementById('btnRestore').classList.add('active');

            document.getElementById('polygonControls').style.display = (toolName === 'polygon') ? 'block' : 'none';
            resetPolygon();
            
            workspace.className = '';
            if (toolName === 'move') workspace.classList.add('grabbing'); // Move icon
            else if (toolName === 'polygon' || toolName === 'magic') workspace.classList.add('pencil');
            else workspace.classList.add('crosshair');

            // Tutup sidebar mobile saat ganti tool agar bisa langsung edit
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('open')) window.toggleSidebar();
            }
        }

        window.startCompare = function() {
            if (!state.originalImage) return;
            ctx.drawImage(state.originalImage, 0, 0);
            showToast("Tampilan Asli");
        }
        window.endCompare = function() {
            if (!state.originalImage) return;
            if (state.historyStep >= 0) {
                ctx.putImageData(state.history[state.historyStep], 0, 0);
            } else {
                ctx.drawImage(state.originalImage, 0, 0);
            }
        }

        // --- Interaction Handlers (Mouse & Touch) ---
        function getCanvasCoords(e) {
            const rect = overlayCanvas.getBoundingClientRect();
            let clientX, clientY;
            
            // Deteksi Mouse vs Touch
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: (clientX - rect.left) / state.scale,
                y: (clientY - rect.top) / state.scale
            };
        }

        function setupInteractions() {
            // --- MOUSE EVENTS ---
            overlayCanvas.addEventListener('wheel', (e) => {
                if (!state.originalImage) return;
                e.preventDefault();
                const delta = -e.deltaY * 0.001;
                const newScale = Math.min(Math.max(0.05, state.scale + delta), 10);
                state.scale = newScale;
                updateTransform();
                document.getElementById('infoOverlay').innerText = `Zoom: ${(state.scale * 100).toFixed(0)}%`;
            });

            overlayCanvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);

            // --- TOUCH EVENTS (Mobile) ---
            overlayCanvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            window.addEventListener('touchmove', handleTouchMove, { passive: false });
            window.addEventListener('touchend', handleEnd);
        }

        // Unified Handlers
        function handleStart(e) {
            if (e.button === 1 || (e.button === 0 && state.tool === 'move')) {
                state.panning = true;
                state.startX = e.clientX - state.pointX;
                state.startY = e.clientY - state.pointY;
                workspace.classList.add('grabbing');
            } 
            else if (e.button === 0 && state.tool === 'polygon') {
                const coords = getCanvasCoords(e);
                if (state.polyPoints.length > 2) {
                    const start = state.polyPoints[0];
                    if (Math.hypot(coords.x - start.x, coords.y - start.y) < 10 / state.scale) {
                        finishPolygon('outside');
                        return;
                    }
                }
                state.polyPoints.push({x: coords.x, y: coords.y});
                drawOverlay();
            }
            else if (e.button === 0 && state.tool === 'magic') {
                const coords = getCanvasCoords(e);
                const x = Math.floor(coords.x);
                const y = Math.floor(coords.y);
                if (x >= 0 && x < mainCanvas.width && y >= 0 && y < mainCanvas.height) {
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    state.targetColor = {r: pixel[0], g: pixel[1], b: pixel[2]};
                    performMagicWand(x, y);
                }
            }
            else if (e.button === 0 && (state.tool === 'eraser' || state.tool === 'restore')) {
                state.isDrawing = true;
                const coords = getCanvasCoords(e);
                state.lastX = coords.x;
                state.lastY = coords.y;
                draw(coords.x, coords.y, false);
            }
        }

        function handleTouchStart(e) {
            // Jika 2 jari, itu gesture Zoom/Pan khusus
            if (e.touches.length === 2) {
                state.initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                return;
            }

            // Jika 1 jari, simpan posisi awal untuk pan/drag
            if (e.touches.length === 1) {
                e.preventDefault(); // Mencegah scroll halaman
                const touch = e.touches[0];
                
                // Simulasi Event Object untuk handleStart
                const fakeEvent = {
                    button: 0,
                    clientX: touch.clientX,
                    clientY: touch.clientY
                };
                handleStart(fakeEvent);
            }
        }

        function handleMove(e) {
            if (state.panning) {
                e.preventDefault();
                state.pointX = e.clientX - state.startX;
                state.pointY = e.clientY - state.startY;
                updateTransform();
            } else if (state.isDrawing) {
                const coords = getCanvasCoords(e);
                draw(coords.x, coords.y, true);
            } else if (state.tool === 'polygon') {
                drawOverlay(getCanvasCoords(e));
            }
        }

        function handleTouchMove(e) {
            // 2 Jari Zoom Logic
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );

                if (state.initialPinchDistance) {
                    const delta = currentDistance - state.initialPinchDistance;
                    // Sensitivitas zoom touch
                    const newScale = Math.min(Math.max(0.05, state.scale + (delta * 0.005)), 10);
                    state.scale = newScale;
                    updateTransform();
                    state.initialPinchDistance = currentDistance; // Update untuk loop berikutnya
                    document.getElementById('infoOverlay').innerText = `Zoom: ${(state.scale * 100).toFixed(0)}%`;
                }
                return;
            }

            // 1 Jari Logic
            if (e.touches.length === 1) {
                e.preventDefault();
                const touch = e.touches[0];
                const fakeEvent = { clientX: touch.clientX, clientY: touch.clientY };
                handleMove(fakeEvent);
            }
        }

        function handleEnd(e) {
            state.panning = false;
            state.initialPinchDistance = null; // Reset pinch
            workspace.classList.remove('grabbing');
            if (state.isDrawing) {
                state.isDrawing = false;
                saveHistory();
            }
        }

        // --- Drawing ---
        function draw(x, y, isMoving) {
            ctx.save();
            ctx.beginPath();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = state.brushSize;

            if (state.tool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
            } else if (state.tool === 'restore') {
                ctx.globalCompositeOperation = 'source-over';
                ctx.moveTo(state.lastX, state.lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.clip(); 
                ctx.drawImage(state.originalImage, 0, 0);
                ctx.restore();
                return;
            }

            ctx.moveTo(state.lastX, state.lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();

            state.lastX = x;
            state.lastY = y;
        }

        // --- Magic Wand ---
        function performMagicWand(startX, startY) {
            showToast("Memproses Magic Wand...");
            setTimeout(() => {
                const width = mainCanvas.width;
                const height = mainCanvas.height;
                const imageData = ctx.getImageData(0, 0, width, height);
                const data = imageData.data;
                
                const tol = state.tolerance * 4.4;
                const startIdx = (startY * width + startX) * 4;
                const startR = data[startIdx], startG = data[startIdx+1], startB = data[startIdx+2];

                const match = (idx) => {
                    const r = data[idx], g = data[idx+1], b = data[idx+2];
                    return Math.sqrt(Math.pow(r-startR,2)+Math.pow(g-startG,2)+Math.pow(b-startB,2)) <= tol;
                };

                const stack = [[startX, startY]];
                const visited = new Uint8Array(width * height);

                while (stack.length) {
                    const [x, y] = stack.pop();
                    const idx = (y * width + x);
                    if (visited[idx]) continue;

                    const pxIdx = idx * 4;
                    if (x >= 0 && x < width && y >= 0 && y < height && match(pxIdx)) {
                        data[pxIdx + 3] = 0;
                        visited[idx] = 1;
                        stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
                    }
                }
                ctx.putImageData(imageData, 0, 0);
                saveHistory();
            }, 10);
        }

        // --- Global Color Removal ---
        document.getElementById('removeColorBtn').addEventListener('click', () => {
             if (!state.originalImage) return;
             showToast("Menghapus warna global...");
             setTimeout(() => {
                const width = mainCanvas.width;
                const height = mainCanvas.height;
                const imgData = ctx.getImageData(0, 0, width, height);
                const data = imgData.data;
                const {r:tr, g:tg, b:tb} = state.targetColor;
                const tol = state.tolerance * 4.4;
                for(let i=0; i<data.length; i+=4) {
                    const dist = Math.sqrt(Math.pow(data[i]-tr,2)+Math.pow(data[i+1]-tg,2)+Math.pow(data[i+2]-tb,2));
                    if(dist <= tol) data[i+3] = 0;
                }
                ctx.putImageData(imgData, 0, 0);
                saveHistory();
             }, 10);
        });

        // --- Polygon Logic ---
        function drawOverlay(mousePos = null) {
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            if (state.tool !== 'polygon' || state.polyPoints.length === 0) return;

            oCtx.beginPath();
            oCtx.lineWidth = 2 / state.scale;
            oCtx.strokeStyle = '#00ff00';
            oCtx.moveTo(state.polyPoints[0].x, state.polyPoints[0].y);
            for (let i = 1; i < state.polyPoints.length; i++) oCtx.lineTo(state.polyPoints[i].x, state.polyPoints[i].y);
            
            if (mousePos) {
                oCtx.lineTo(mousePos.x, mousePos.y);
                oCtx.setLineDash([5 / state.scale, 5 / state.scale]);
            } else oCtx.setLineDash([]);
            
            oCtx.stroke();
            oCtx.setLineDash([]);
            oCtx.fillStyle = '#fff';
            state.polyPoints.forEach(p => {
                oCtx.beginPath(); oCtx.arc(p.x, p.y, 3 / state.scale, 0, Math.PI*2); oCtx.fill();
            });
        }

        window.resetPolygon = function() {
            state.polyPoints = [];
            drawOverlay();
        }

        window.finishPolygon = function(action) {
            if (state.polyPoints.length < 3) return;
            const path = new Path2D();
            path.moveTo(state.polyPoints[0].x, state.polyPoints[0].y);
            state.polyPoints.forEach(p => path.lineTo(p.x, p.y));
            path.closePath();

            ctx.save();
            if (action === 'outside') {
                const savedData = ctx.getImageData(0,0, mainCanvas.width, mainCanvas.height);
                ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                ctx.clip(path);
                ctx.putImageData(savedData, 0, 0);
            } else {
                ctx.clip(path);
                ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            }
            ctx.restore();
            resetPolygon();
            saveHistory();
        }

        // --- History & Utils ---
        function saveHistory() {
            if (state.historyStep < state.history.length - 1) state.history = state.history.slice(0, state.historyStep+1);
            state.history.push(ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height));
            state.historyStep++;
            updateUI();
        }

        document.getElementById('undoBtn').onclick = () => {
            if (state.historyStep > 0) {
                state.historyStep--;
                ctx.putImageData(state.history[state.historyStep], 0, 0);
                updateUI();
            }
        };
        document.getElementById('redoBtn').onclick = () => {
            if (state.historyStep < state.history.length - 1) {
                state.historyStep++;
                ctx.putImageData(state.history[state.historyStep], 0, 0);
                updateUI();
            }
        };
        document.getElementById('resetBtn').onclick = () => {
            if (state.originalImage && confirm('Reset semua perubahan?')) {
                ctx.clearRect(0,0,mainCanvas.width, mainCanvas.height);
                ctx.drawImage(state.originalImage, 0, 0);
                saveHistory();
                showToast("Reset.");
            }
        };
        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'master-remover-mobile.png';
            link.href = mainCanvas.toDataURL('image/png');
            link.click();
        };

        // UI Listeners
        document.getElementById('brushSize').addEventListener('input', (e) => {
            state.brushSize = parseInt(e.target.value);
            document.getElementById('brushSizeVal').innerText = state.brushSize + 'px';
        });
        document.getElementById('tolerance').addEventListener('input', (e) => {
            state.tolerance = parseInt(e.target.value);
            document.getElementById('toleranceVal').innerText = state.tolerance;
        });

        function updateUI(hasImage = false) {
            const imgLoaded = !!state.originalImage;
            document.getElementById('btnAutoRemove').disabled = !imgLoaded;
            document.getElementById('compareBtn').disabled = !imgLoaded;
            document.getElementById('resetBtn').disabled = !imgLoaded;
            document.getElementById('downloadBtn').disabled = !imgLoaded;
            document.getElementById('removeColorBtn').disabled = !imgLoaded;
            document.getElementById('undoBtn').disabled = state.historyStep <= 0;
            document.getElementById('redoBtn').disabled = state.historyStep >= state.history.length - 1;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
